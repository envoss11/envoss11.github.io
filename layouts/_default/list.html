{{- define "main" }}
<div class="list-page">
  <h1>{{ .Title }}</h1>
  <ul class="post-list">
    {{- range .Pages }}
    <li>
      <a href="{{ .Permalink }}">{{ .LinkTitle }}</a>
      <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "January 2, 2006" }}</time>
    </li>
    {{- end }}
  </ul>
</div>
{{- end }}
