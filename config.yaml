languageCode: en-us
baseURL: "https://envoss11.github.io"
title: Eric Voss
theme: PaperMod

enableInlineShortcodes: true
enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false
enableEmoji: true
pygmentsUseClasses: true

taxonomies:
  category: categories
  tag: tags
  series: series

minify:
  disableXML: true

outputs:
  home:
    - HTML
    - RSS
    - JSON

params:
  env: production
  description: "I'm a Lead Data Scientist with 10 years of experience in insurance and financial services. My background spans traditional statistical modeling to modern AI deployment, with recent focus on putting generative AI systems into production at scale."
  author: Eric Voss

  defaultTheme: light
  disableThemeToggle: true
  ShowShareButtons: false
  ShowReadingTime: true
  displayFullLangName: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: false
  ShowCodeCopyButtons: true
  ShowRssButtonInSectionTermList: false
  ShowToc: true

  profileMode:
    enabled: false

  socialIcons:
    - name: linkedin
      url: "https://www.linkedin.com/in/ericvoss11/"

  assets:
    disableHLJS: true

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false

privacy:
  vimeo:
    disabled: false
    simple: true
  x:
    disabled: false
    enableDNT: true
    simple: true
  instagram:
    disabled: false
    simple: true
  youtube:
    disabled: false
    privacyEnhanced: true

services:
  instagram:
    disableInlineCSS: true
  x:
    disableInlineCSS: true

menu:
  main:
    - identifier: archive
      name: Archive
      url: /archives/
      weight: 10
    - identifier: search
      name: Search
      url: /search/
      weight: 20
    - identifier: about
      name: About
      url: /about/
      weight: 30
