languageCode: en-us
baseURL: "https://envoss11.github.io"
title: Eric Voss

enableInlineShortcodes: true
enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false
enableEmoji: true
pygmentsUseClasses: true

taxonomies:
  category: categories
  tag: tags
  series: series

minify:
  disableXML: true

outputs:
  home:
    - HTML
    - RSS

params:
  env: production
  description: "I'm a Lead Data Scientist with 10 years of experience in insurance and financial services. My background spans traditional statistical modeling to modern AI deployment, with recent focus on putting generative AI systems into production at scale."
  author: Eric Voss
  tagline: "Data science, AI in production, and the occasional opinion."

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false

privacy:
  vimeo:
    disabled: false
    simple: true
  x:
    disabled: false
    enableDNT: true
    simple: true
  instagram:
    disabled: false
    simple: true
  youtube:
    disabled: false
    privacyEnhanced: true

services:
  instagram:
    disableInlineCSS: true
  x:
    disableInlineCSS: true

menu:
  main:
    - identifier: about
      name: About
      url: /about/
      weight: 10
